# 在 GitHub 上构建（快），再 SCP 到阿里云并重启 PM2（服务器不再跑 npm install / next build）
# 配置见 docs/DEPLOY-AUTO.md

name: Deploy to server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 安装依赖并构建
        run: |
          # 勿在 npm ci 时设 NODE_ENV=production，否则会跳过 devDependencies（含 typescript），next.config.ts 无法加载
          npm ci
          SKIP_BUILD_CHECKS=1 npm run build
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          tar czf deploy-bundle.tar.gz -C .next/standalone .
          ls -lh deploy-bundle.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: deploy-bundle.tar.gz
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检查必填 Secrets
        run: |
          missing=0
          check() { if [ -z "$1" ]; then echo "❌ 缺少 Secret: $2"; missing=1; fi; }
          check "${{ secrets.SSH_HOST }}" "SSH_HOST"
          check "${{ secrets.SSH_USER }}" "SSH_USER"
          check "${{ secrets.SSH_PRIVATE_KEY }}" "SSH_PRIVATE_KEY"
          check "${{ secrets.DEPLOY_PATH }}" "DEPLOY_PATH"
          if [ "$missing" -eq 1 ]; then exit 1; fi

      - name: 写入 SSH 私钥
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          KEY_FILE="${RUNNER_TEMP}/deploy_key"
          printf '%s' "$SSH_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if ! grep -q "BEGIN.*PRIVATE KEY" "$KEY_FILE"; then
            echo "::error::SSH_PRIVATE_KEY 格式无效"
            exit 1
          fi
          echo "DEPLOY_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          name: deploy-bundle

      - name: 上传构建包到服务器
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: ${{ env.DEPLOY_KEY_PATH }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: deploy-bundle.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}

      - name: 解压并重启 PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: ${{ env.DEPLOY_KEY_PATH }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 90s
          command_timeout: 5m
          script_stop: true
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            mkdir -p "${DEPLOY_PATH}/data"
            if [ ! -f "${DEPLOY_PATH}/deploy-bundle.tar.gz" ]; then
              echo "❌ 未找到 deploy-bundle.tar.gz"
              exit 1
            fi
            echo "[deploy] 解压构建包..."
            RELEASE_DIR="${DEPLOY_PATH}/release"
            mkdir -p "${RELEASE_DIR}"
            rm -rf "${RELEASE_DIR:?}"/*
            tar xzf "${DEPLOY_PATH}/deploy-bundle.tar.gz" -C "${RELEASE_DIR}"
            if [ ! -f "${RELEASE_DIR}/server.js" ]; then
              echo "❌ release 内缺少 server.js"
              exit 1
            fi
            [ -f "${DEPLOY_PATH}/.env.local" ] && ln -sf "${DEPLOY_PATH}/.env.local" "${RELEASE_DIR}/.env.local" || true
            export SITE_PUBLISH_PATH="${DEPLOY_PATH}/data/published-site.json"
            echo "[deploy] 同步部署脚本（若仓库存在）..."
            if [ -d "${DEPLOY_PATH}/.git" ]; then
              cd "${DEPLOY_PATH}"
              git fetch --depth=1 origin main 2>/dev/null && git checkout -f origin/main -- scripts/ 2>/dev/null || true
            fi
            echo "[deploy] 重启 PM2（加载 .env.local 白名单）..."
            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin:/home/${{ secrets.SSH_USER }}/.npm-global/bin"
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "[deploy] 未找到 pm2，尝试全局安装..."
              npm install -g pm2
            fi
            if [ -x "${DEPLOY_PATH}/scripts/pm2-start-release.sh" ]; then
              bash "${DEPLOY_PATH}/scripts/pm2-start-release.sh" "${DEPLOY_PATH}"
            else
              cd "${RELEASE_DIR}"
              export HOSTNAME=0.0.0.0
              export PORT=3000
              export SITE_PUBLISH_PATH="${DEPLOY_PATH}/data/published-site.json"
              pm2 delete resume-web 2>/dev/null || true
              pm2 start server.js --name resume-web --update-env
              pm2 save 2>/dev/null || true
            fi
            pm2 list
            echo "[deploy] 重启 HTTPS 反代（若存在）..."
            if command -v systemctl >/dev/null 2>&1; then
              systemctl restart caddy 2>/dev/null || systemctl reload nginx 2>/dev/null || true
            fi
            echo "[deploy] 健康检查..."
            ok=0
            for i in 1 2 3 4 5 6; do
              if curl -fsS --connect-timeout 3 --max-time 12 "http://127.0.0.1:3000/api/health" >/dev/null; then
                ok=1
                break
              fi
              echo "[deploy] 等待应用就绪 (${i}/6)..."
              sleep 3
            done
            if [ "$ok" -ne 1 ]; then
              echo "❌ 本机健康检查失败，请登录服务器执行: bash scripts/server-fix-online.sh"
              pm2 logs resume-web --lines 40 --nostream 2>/dev/null || true
              exit 1
            fi
            echo "HTTP OK"
